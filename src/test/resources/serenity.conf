serenity {
  project.name = "Prueba Saucedemo"
  take.screenshots = FOR_FAILURES
  logging = VERBOSE
}

webdriver {
  driver = chrome
}

chrome {

  switches = [
    "--start-maximized",

    "--disable-notifications",
    "--disable-popup-blocking",
    "--disable-extensions",
    "--disable-infobars",

    "--disable-save-password-bubble",
    "--disable-features=PasswordManagerEnabled",
    "--disable-features=PasswordLeakDetection",
    "--disable-features=PasswordManagerOnboarding",
    "--disable-features=PasswordCheck",
    "--disable-features=SafetyCheck",
    "--disable-features=SecurityInterstitials"
  ]

  preferences {
    # 🔒 Password manager OFF
    "credentials_enable_service" = false
    "profile.password_manager_enabled" = false
    "profile.credentials_enable_service" = false
    "password_manager_enabled" = false
    "profile.password_manager_leak_detection" = false
    "autofill.profile_enabled" = false
    "autofill.credit_card_enabled" = false
    "autofill.enabled" = false
    "profile.default_content_setting_values.cookies" = 2
  }
}